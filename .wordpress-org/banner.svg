        <line x1="556" y1="125" x2="740" y2="125"/>
        <line x1="556" y1="80"  x2="740" y2="80"/>
        <line x1="556" y1="170" x2="740" y2="170"/>
        <ellipse cx="648" cy="125" rx="37" ry="92"/>
        <line x1="648" y1="33" x2="648" y2="217"/>
      </g>
    </g>
